name: Skill proposal
description: Propose a new skill or suggest changes to an existing workflow
labels: ["skill"]
body:
  - type: input
    id: skill-name
    attributes:
      label: Skill name
      description: Lowercase-hyphenated, matches the folder name.
    validations:
      required: true
  - type: dropdown
    id: action
    attributes:
      label: Action
      options:
        - New skill
        - Improve existing skill
    validations:
      required: true
  - type: textarea
    id: when
    attributes:
      label: When to use this skill
      description: What intent triggers it? (e.g. "deploying to production", "debugging a race condition")
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Workflow / steps
      description: The skill's steps and exit criteria.
    validations:
      required: true
